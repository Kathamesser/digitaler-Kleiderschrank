{% extends "base.html" %}
{% block titel %}Neues Kleidungsstück{% endblock %}

{% block inhalt %}
  <h1>Neues Kleidungsstück</h1>
  <!-- enctype="multipart/form-data" ist Pflicht, sobald Dateien hochgeladen werden -->
  <form method="post" class="formular" enctype="multipart/form-data">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required
           placeholder="Beschreibung (optional)">

    <label for="kategorie">Kategorie</label>
    <select id="kategorie" name="kategorie" required>
      <option value="" selected disabled hidden>Kategorie</option>
      <option>Oberteile</option>
      <option>Hosen</option>
      <option>Kleider</option>
      <option>Röcke</option>
      <option>Jacken</option>
      <option>Schuhe</option>
      <option>Taschen</option>
      <option>Schmuck</option>
      <option>Brillen</option>
      <option>Accessoires</option>
      <option>Kopfbedeckungen</option>
      <option>Sonstiges</option>
    </select>

    <label for="farbe">Farbe (optional)</label>
    <select id="farbe" name="farbe">
      <option value="">Keine Angabe</option>
      <option>Schwarz</option>
      <option>Weiß</option>
      <option>Grau</option>
      <option>Beige</option>
      <option>Braun</option>
      <option>Dunkelblau</option>
      <option>Blau</option>
      <option>Hellblau</option>
      <option>Türkis</option>
      <option>Grün</option>
      <option>Olivgrün</option>
      <option>Gelb</option>
      <option>Orange</option>
      <option>Rot</option>
      <option>Bordeaux</option>
      <option>Rosa</option>
      <option>Lila</option>
      <option>Gold</option>
      <option>Silber</option>
      <option>Bunt</option>
      <option>Gemustert</option>
      <option>Sonstiges</option>
    </select>

    <label for="foto">Foto (optional)</label>
    <!-- capture="environment" öffnet am Handy direkt die Kamera -->
    <input type="file" id="foto" name="foto" accept="image/*" capture="environment">

    <button type="submit" class="knopf">In den Schrank hängen</button>
  </form>
{% endblock %}
